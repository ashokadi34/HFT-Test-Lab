version: '3.9'

services:

  postgres:

    image: postgres:17

    container_name: hft-postgres

    restart: always

    environment:
      POSTGRES_DB: hftdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:

  postgres-data: